<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRACKSHOT — Setlist Archive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <h1 class="band-name">
        <img src="assets/crackshot-logo.png" alt="CRACKSHOT" class="band-logo">
      </h1>
      <nav class="year-nav" id="yearNav">
        <!-- 연도 탭이 JS로 자동 생성됩니다 -->
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="concert-list" id="concertList">
      <!-- 공연 블록 목록이 JS로 자동 생성됩니다 -->
    </section>

    <section class="setlist-view" id="setlistView">
      <!-- 선택된 공연의 세트리스트가 JS로 자동 생성됩니다 -->
    </section>
  </main>

  <footer class="footer">
    <p>CRACKSHOT SETLIST ARCHIVE</p>
  </footer>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
